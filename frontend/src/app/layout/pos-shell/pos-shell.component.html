<div class="layout">
  <div class="mobile-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="brand">
      <img src="/logo.jpeg" alt="Bambino Chicken" />
      <div>
        <h3>Bambino Chicken</h3>
        <p>Sistema POS</p>
      </div>
      <button class="close-mobile" type="button" (click)="closeSidebar()">×</button>
    </div>

    <nav>
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.to"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        (click)="closeSidebar()"
      >
        <span class="nav-icon" [ngSwitch]="item.icon">
          <svg *ngSwitchCase="'DB'" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h8V3H3v10zm10 8h8V11h-8v10zM3 21h8v-6H3v6zm10-18v6h8V3h-8z"/></svg>
          <svg *ngSwitchCase="'NV'" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>
          <svg *ngSwitchCase="'VT'" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59L5.25 14c-.17.3-.25.63-.25 1 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L8.1 13h7.45c.75 0 1.41-.41 1.75-1.03L21 5H6.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2z"/></svg>
          <svg *ngSwitchCase="'RD'" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h2v-2H3v2zm4 6h2V5H7v14zm4-8h2V3h-2v8zm4 10h2V7h-2v14zm4-14v2h2V7h-2z"/></svg>
          <svg *ngSwitchCase="'CJ'" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 7H3V5h18v2zm0 2H3v10h18V9zM8 16H5v-2h3v2z"/></svg>
          <svg *ngSwitchDefault viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/></svg>
        </span>
        {{ item.label }}
      </a>
    </nav>

    <div class="bottom-actions">
      <a routerLink="/" routerLinkActive="active-home" [routerLinkActiveOptions]="{ exact: true }" (click)="closeSidebar()">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </span>
        Inicio
      </a>
      <section class="box user-box" *ngIf="authService.user() as user">
        <p class="box-value">{{ user.nombre }}</p>
        <p class="box-label">{{ user.rol }} - {{ user.localNombre }}</p>
      </section>
      <button type="button" (click)="logout()">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 17v-3H9v-4h7V7l5 5-5 5zM14 3H3v18h11v-2H5V5h9V3z"/></svg>
        </span>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <main>
    <header class="topbar" *ngIf="authService.user() as user">
      <button class="menu-mobile" type="button" (click)="sidebarOpen = true">☰</button>
      <span>{{ user.localNombre }}</span>
      <small>{{ user.rol }}</small>
    </header>
    <router-outlet></router-outlet>
  </main>
</div>
