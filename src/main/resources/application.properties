spring.application.name=bambinochicken

# Oracle DB (primary datasource)
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:BAMBINO}
spring.datasource.password=${DB_PASSWORD:Bambino123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# MySQL DB (secondary datasource)
spring.mysql-datasource.url=${MYSQL_DB_URL:jdbc:mysql://localhost:3306/bambino?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.mysql-datasource.username=${MYSQL_DB_USERNAME:root}
spring.mysql-datasource.password=${MYSQL_DB_PASSWORD:EspirituxD.1}
spring.mysql-datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Disable single auto repository wiring; dual JPA repositories are configured manually
spring.data.jpa.repositories.enabled=false

# Dual JPA schema strategy
app.oracle.jpa.ddl-auto=${ORACLE_JPA_DDL_AUTO:update}
app.mysql.jpa.ddl-auto=${MYSQL_JPA_DDL_AUTO:update}

# SQL logs
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# Actuator health endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# DB monitor alerts
app.health.db-monitor.enabled=${DB_MONITOR_ENABLED:true}
app.health.db-monitor.delay-ms=${DB_MONITOR_DELAY_MS:30000}
